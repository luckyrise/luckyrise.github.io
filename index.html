<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>标化清单_0415 - 可视化看板</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
    background: #0f1c3f;
    color: #e8edf5;
    min-height: 100vh;
  }
  .header {
    background: linear-gradient(135deg, #1a3a6b 0%, #0d2240 100%);
    border-bottom: 2px solid #2a5ca8;
    padding: 18px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 14px;
  }
  .header h1 { font-size: 20px; font-weight: 700; color: #5ba4f5; letter-spacing: 2px; }
  .header .subtitle { font-size: 12px; color: #8ab4f8; margin-top: 3px; }
  .header-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .header-controls label { font-size: 13px; color: #8ab4f8; }
  select {
    padding: 7px 14px; border-radius: 8px; border: 1px solid #2a5ca8;
    background: #162044; color: #e8edf5; font-size: 13px; min-width: 140px;
    cursor: pointer; outline: none;
  }
  select:focus { border-color: #5ba4f5; }
  button {
    padding: 7px 18px; border-radius: 8px; border: none;
    background: #2a5ca8; color: #fff; font-size: 13px; cursor: pointer; transition: background 0.2s;
  }
  button:hover { background: #3a6cc8; }
  button.reset-btn { background: transparent; border: 1px solid #3a5a8a; color: #8ab4f8; }
  button.reset-btn:hover { background: #162044; }

  .main-content { padding: 20px 40px; max-width: 1600px; margin: 0 auto; }

  .stat-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: linear-gradient(145deg, #1a3060, #162044);
    border: 1px solid #2a4a8a;
    border-radius: 12px;
    padding: 16px 20px;
    position: relative;
    overflow: hidden;
  }
  .stat-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, #2a5ca8, #5ba4f5);
    border-radius: 12px 12px 0 0;
  }
  .stat-card.orange::before { background: linear-gradient(90deg, #e67e22, #f39c12); }
  .stat-card.green::before { background: linear-gradient(90deg, #27ae60, #2ecc71); }
  .stat-card.purple::before { background: linear-gradient(90deg, #8e44ad, #a569bd); }
  .stat-card.red::before { background: linear-gradient(90deg, #c0392b, #e74c3c); }
  .stat-card-label { font-size: 11px; color: #8ab4f8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .stat-card-value { font-size: 26px; font-weight: 700; color: #fff; line-height: 1; }
  .stat-card-sub { font-size: 11px; color: #5a7aaa; margin-top: 5px; }
  .stat-card.orange .stat-card-value { color: #f39c12; }
  .stat-card.green .stat-card-value { color: #2ecc71; }
  .stat-card.purple .stat-card-value { color: #a569bd; }
  .stat-card.red .stat-card-value { color: #e74c3c; }

  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 20px;
  }
  .charts-full { margin-bottom: 20px; }
  .chart-card {
    background: linear-gradient(145deg, #1a3060, #162044);
    border: 1px solid #2a4a8a;
    border-radius: 12px;
    padding: 16px;
  }
  .chart-title {
    font-size: 13px; color: #8ab4f8; margin-bottom: 12px;
    padding-bottom: 8px; border-bottom: 1px solid #2a4a8a; letter-spacing: 1px;
  }
  .chart-container { height: 300px; width: 100%; }

  .table-card {
    background: linear-gradient(145deg, #1a3060, #162044);
    border: 1px solid #2a4a8a;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 20px;
  }
  .table-wrapper { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead th {
    background: #0d1e40; color: #8ab4f8; padding: 9px 10px;
    text-align: left; font-weight: 600; border-bottom: 2px solid #2a5ca8;
    white-space: nowrap; cursor: pointer; user-select: none;
  }
  thead th:hover { color: #5ba4f5; }
  tbody tr { border-bottom: 1px solid #1a2a50; transition: background 0.15s; }
  tbody tr:hover { background: #1e3060; }
  tbody td { padding: 8px 10px; color: #c8d8f0; }
  .money { color: #f39c12; font-weight: 600; font-family: 'Courier New', monospace; }
  .tag { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 600; }
  .tag-high { background: rgba(39,174,96,0.2); color: #2ecc71; }
  .tag-mid { background: rgba(243,156,18,0.2); color: #f39c12; }
  .tag-low { background: rgba(231,76,60,0.2); color: #e74c3c; }
  .bar-bg { height: 5px; background: #1a2a50; border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #2a5ca8, #5ba4f5); }

  .footer { text-align: center; padding: 14px; color: #3a5080; font-size: 11px; }

  @media (max-width: 900px) {
    .charts-row { grid-template-columns: 1fr; }
    .main-content { padding: 14px; }
    .header { padding: 14px; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>标化清单数据看板</h1>
    <div class="subtitle">数据来源：标化清单_0415.xlsx &nbsp;|&nbsp; 更新日期：2026-04-15</div>
  </div>
  <div class="header-controls">
    <label for="branchFilter">落地支局筛选：</label>
    <select id="branchFilter"><option value="all">全部支局</option></select>
    <button class="reset-btn" id="resetBtn">重置筛选</button>
  </div>
</div>

<div class="main-content">
  <div class="stat-cards" id="statCards"></div>

  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-title">各落地支局业务量排名</div>
      <div class="chart-container" id="barChart"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">各落地支局销售额分布</div>
      <div class="chart-container" id="pieChart"></div>
    </div>
  </div>

  <div class="table-card">
    <div class="chart-title" id="tableTitle">落地支局明细数据</div>
    <div class="table-wrapper">
      <table>
        <thead><tr id="tableHead"></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="footer">数据仅供参考 &middot; 报告生成时间：2026-04-17</div>

<script>
let allBranches = [];
let filteredBranches = [];
let globalTotal = {};

fetch('data.json')
  .then(r => r.json())
  .then(data => {
    allBranches = data.branch_list;
    globalTotal = data.total;
    buildDropdown();
    applyFilter('all');
  })
  .catch(err => {
    document.querySelector('.main-content').innerHTML =
      '<p style="color:#e74c3c;text-align:center;margin:40px">数据加载失败: ' + err.message + '</p>';
  });

function buildDropdown() {
  const sel = document.getElementById('branchFilter');
  allBranches.forEach(b => {
    const opt = document.createElement('option');
    opt.value = b.branch;
    opt.textContent = b.branch + ' (' + b.count + '条)';
    sel.appendChild(opt);
  });
  sel.addEventListener('change', e => applyFilter(e.target.value));
  document.getElementById('resetBtn').addEventListener('click', () => {
    sel.value = 'all';
    applyFilter('all');
  });
}

function applyFilter(branch) {
  filteredBranches = branch === 'all' ? allBranches : allBranches.filter(b => b.branch === branch);
  updateStats();
  updateBarChart();
  updatePieChart();
  updateTable();
  document.getElementById('tableTitle').textContent =
    branch === 'all' ? '落地支局明细数据' : '落地支局：' + branch + ' &middot; 明细数据';
}

function updateStats() {
  const stats = filteredBranches;
  const totalCount = stats.reduce((s, b) => s + b.count, 0);
  const totalAmount = stats.reduce((s, b) => s + b.total_amount, 0);
  const totalQty = stats.reduce((s, b) => s + b.total_qty, 0);
  const totalCustomer = stats.reduce((s, b) => s + b.customer_count, 0);
  const avgAmount = totalCount ? (totalAmount / totalCount) : 0;

  document.getElementById('statCards').innerHTML = [
    { label: '总记录数', value: totalCount.toLocaleString(), sub: '共 ' + stats.length + ' 个支局', cls: '' },
    { label: '总销售额（元）', value: formatMoney(totalAmount), sub: '平均单笔: ' + formatMoney(avgAmount), cls: 'orange' },
    { label: '总客户数', value: totalCustomer.toLocaleString(), sub: '总实物量: ' + totalQty.toFixed(2), cls: 'green' },
    { label: '未筛选总销售额', value: formatMoney(globalTotal.amount), sub: '未筛选记录: ' + globalTotal.count + '条', cls: 'purple' }
  ].map(c => '<div class="stat-card ' + c.cls + '"><div class="stat-card-label">' + c.label + '</div><div class="stat-card-value">' + c.value + '</div><div class="stat-card-sub">' + c.sub + '</div></div>').join('');
}

function formatMoney(v) {
  if (v >= 10000) return (v / 10000).toFixed(1) + '万';
  return v.toLocaleString('zh-CN', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

function updateBarChart() {
  const chart = echarts.init(document.getElementById('barChart'));
  const sorted = [...filteredBranches].sort((a, b) => b.count - a.count);
  const branches = sorted.map(b => b.branch);
  const counts = sorted.map(b => b.count);
  const amounts = sorted.map(b => parseFloat((b.total_amount / 10000).toFixed(2)));

  chart.setOption({
    tooltip: {
      trigger: 'axis', axisPointer: { type: 'shadow' },
      formatter(p) {
        let res = '<strong>' + p[0].name + '</strong><br/>';
        p.forEach(item => { res += item.marker + ' ' + item.seriesName + ': <strong>' + (item.seriesName === '销售额(万)' ? item.value + '万' : item.value + '条') + '</strong><br/>'; });
        return res;
      }
    },
    legend: { data: ['记录数', '销售额(万)'], textStyle: { color: '#8ab4f8' }, top: 0 },
    grid: { left: '3%', right: '4%', bottom: '15%', top: '40px', containLabel: true },
    xAxis: { type: 'category', data: branches, axisLabel: { color: '#8ab4f8', rotate: 30, fontSize: 10 }, axisLine: { lineStyle: { color: '#2a4a8a' } } },
    yAxis: [
      { type: 'value', name: '记录数', axisLabel: { color: '#8ab4f8' }, splitLine: { lineStyle: { color: '#1a2a50', type: 'dashed' } } },
      { type: 'value', name: '销售额(万)', axisLabel: { color: '#8ab4f8' }, splitLine: { show: false } }
    ],
    series: [
      {
        name: '记录数', type: 'bar',
        data: counts,
        itemStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{ offset: 0, color: '#5ba4f5' }, { offset: 1, color: '#2a5ca8' }]), borderRadius: [3, 3, 0, 0] },
        barWidth: '40%',
        label: { show: true, position: 'top', color: '#8ab4f8', fontSize: 9 }
      },
      {
        name: '销售额(万)', type: 'bar', yAxisIndex: 1,
        data: amounts,
        itemStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{ offset: 0, color: '#f39c12' }, { offset: 1, color: '#e67e22' }]), borderRadius: [3, 3, 0, 0] },
        barWidth: '40%',
        label: { show: true, position: 'top', color: '#f39c12', fontSize: 9 }
      }
    ]
  });
  window.addEventListener('resize', () => chart.resize());
}

function updatePieChart() {
  const chart = echarts.init(document.getElementById('pieChart'));
  const sorted = [...filteredBranches].sort((a, b) => b.total_amount - a.total_amount);
  const total = sorted.reduce((s, b) => s + b.total_amount, 0);

  // Top 8 + others
  const top8 = sorted.slice(0, 8);
  const others = sorted.slice(8);
  const pieData = top8.map(b => ({ name: b.branch, value: parseFloat(b.total_amount.toFixed(2)) }));
  if (others.length > 0) {
    const othersSum = others.reduce((s, b) => s + b.total_amount, 0);
    pieData.push({ name: '其他', value: parseFloat(othersSum.toFixed(2)) });
  }

  const colors = ['#5ba4f5','#f39c12','#2ecc71','#e74c3c','#a569bd','#1abc9c','#3498db','#e67e22','#95a5a6'];

  chart.setOption({
    tooltip: { trigger: 'item', formatter: '{b}: {c}元 ({d}%)' },
    legend: { orient: 'vertical', right: '2%', top: 'center', textStyle: { color: '#8ab4f8', fontSize: 10 }, formatter(name) {
      const item = pieData.find(d => d.name === name);
      return name + ' ' + (item ? formatMoney(item.value) : '');
    }},
    color: colors,
    series: [{
      type: 'pie', radius: ['35%', '65%'], center: ['35%', '50%'],
      avoidLabelOverlap: true,
      itemStyle: { borderRadius: 5, borderColor: '#0f1c3f', borderWidth: 2 },
      label: { show: false },
      emphasis: { label: { show: true, fontSize: 12, fontWeight: 'bold', color: '#fff' } },
      data: pieData
    }]
  });
  window.addEventListener('resize', () => chart.resize());
}

function updateTable() {
  const ths = ['落地支局', '所属区局', '记录数', '客户数', '销售额（元）', '实物量', 'TOP场景', 'TOP渠道'];
  document.getElementById('tableHead').innerHTML = ths.map(h => '<th>' + h + '</th>').join('');
  document.getElementById('tableBody').innerHTML = filteredBranches.map(b => {
    const total = filteredBranches.reduce((s, x) => s + x.count, 0);
    const pct = total ? ((b.count / total) * 100).toFixed(1) : '0.0';
    return '<tr>' +
      '<td><strong>' + b.branch + '</strong></td>' +
      '<td style="color:#8ab4f8;font-size:11px">' + b.district + '</td>' +
      '<td>' + b.count + '<br><div class="bar-bg" style="margin-top:3px"><div class="bar-fill" style="width:' + pct + '%"></div></div><span style="font-size:10px;color:#5a7aaa">' + pct + '%</span></td>' +
      '<td>' + b.customer_count + '</td>' +
      '<td class="money">' + b.total_amount.toLocaleString('zh-CN', {minimumFractionDigits:2}) + '</td>' +
      '<td>' + b.total_qty.toFixed(2) + '</td>' +
      '<td style="font-size:11px;color:#8ab4f8">' + b.top_scene + '</td>' +
      '<td style="font-size:11px;color:#8ab4f8">' + b.top_channel + '</td>' +
    '</tr>';
  }).join('');
}
</script>
</body>
</html>
